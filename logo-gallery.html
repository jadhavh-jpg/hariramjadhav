<!DOCTYPE html>
<html>

<head>

<title>Logo Design Gallery</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
}

.gallery img{
width:100%;
height:150px;
object-fit:contain;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>Logo Design Gallery</h1>

<div class="gallery">

<img src="loster1.png">
<img src="loster2.png">
<img src="loster3.png">
<img src="loster4.png">
<img src="loster5.png">

</div>

</body>

</html>
