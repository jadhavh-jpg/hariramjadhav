  text-align:center;
  margin-bottom:40px;

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

}

.gallery img{
  width:100%;
  height:280px;
  object-fit:cover;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:transform .3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

.back{
  display:block;
  margin-bottom:30px;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>
